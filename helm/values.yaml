# Default values for deckard.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  repository: blipai/deckard
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

labels: {}

# Configure the audit system for all Deckard's deployments using environment variables.
audit:
  # Deckard's DECKARD_AUDIT_ENABLED environment variable
  enabled: false

# Configure the metrics system for all Deckard's deployments using environment variables.
metrics:
  # Enables the metrics endpoint.
  # Used as the DECKARD_METRICS_ENABLED environment variable
  # To enable prometheus scraping you must set valid podAnnotations for both the deckard and housekeeper deployments
  enabled: true
  # Defines the port of the metrics endpoint
  # Used in the deployment to configure the container port and also as the DECKARD_METRICS_PORT environment variable
  port: 9090
  # Defines the path to access metrics
  path: /metrics

env: {}

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

containerPorts: []

connectionSecret:
  storage:
    # Deprecated: use storage.connectionSecret instead.
    existingSecret: ""
    key: storage-uri
  cache:
    # Deprecated: use cache.connectionSecret instead.
    existingSecret: ""
    key: cache-uri

storage:
  # Deckard's DECKARD_STORAGE_TYPE environment variable
  # Available options: MONGODB, MEMORY
  # Remember to set the mongodb.enabled to false if you want to use a existing MongoDB or a Memory storage
  type: MONGODB
  connectionSecret:
    # Use an existing Secret for the storage connection instead of having the chart generate one.
    # Direct storage URI overrides are not exposed through values.yaml; disable mongodb.enabled and provide the URI with this Secret.
    existingSecret: ""
    key: storage-uri
  mongodb:
    # Deckard's DECKARD_MONGODB_DATABASE environment variable
    database: "deckard"
    # Deckard's DECKARD_MONGODB_COLLECTION environment variable
    collection: "queue"
    # Deckard's DECKARD_MONGODB_QUEUE_CONFIGURATION_COLLECTION environment variable
    queue_configuration_collection: "queue_configuration"

# See available options here: https://github.com/bitnami/charts/tree/main/bitnami/mongodb
mongodb:
  # When enabled this chart will also deploy a MongoDB
  enabled: true
  auth:
    enabled: true
    # You can use mongodb.auth.existingSecret for better secret management.
    # Plain text values here are part of bitnami/mongodb config and are allowed.
    rootUser: deckard
    rootPassword: "deckard"
  service:
    ports:
      mongodb: 27017
  architecture: standalone
  # If you change storage.mongodb.database or storage.mongodb.collection you will need to update this script or create indexes manually
  initdbScripts:
    init_database.js: |
      db = db.getSiblingDB("deckard");

      db.queue.createIndex({ "expiry_date": 1 });
      db.queue.createIndex({ "queue": 1, "expiry_date": 1 });
      db.queue.createIndex({ "id": 1, "queue": 1, "score": 1 });
      db.queue.createIndex({ "queue_prefix": 1, "last_usage": 1 });
      db.queue.createIndex({ "id": 1, "queue": 1 }, { unique: true });

cache:
  # Deckard's DECKARD_CACHE_TYPE environment variable
  # Available options: REDIS, MEMORY
  # Remember to set the redis.enabled to false if you want to use a self-deployed Redis or a Memory storage
  type: REDIS
  # Deckard's DECKARD_CACHE_PREFIX environment variable.
  # Defines the Redis key namespace prefix used by Deckard (e.g. "deckard_v1").
  # Change it to run multiple Deckard instances in the same Redis.
  prefix: deckard_v1
  connectionSecret:
    # Use an existing Secret for the cache connection instead of having the chart generate one.
    # The Secret value holds the Redis connection details (address, credentials, db, TLS, timeouts,
    # pool size, etc.): a redis:// or rediss:// URI for standalone, or go-redis's cluster URL format
    # for Redis Cluster (base URI + repeated addr=host:port query params), e.g.
    # "redis://node-1:6379?addr=node-2:6379&addr=node-3:6379".
    existingSecret: ""
    key: cache-uri
  redis:
    cluster:
      # Deckard's DECKARD_REDIS_CLUSTER_MODE environment variable.
      # Only supported with an external Redis Cluster: set redis.enabled=false and provide
      # cache.connectionSecret.existingSecret with the cluster URL described above.
      mode: false

# See available options here: https://github.com/bitnami/charts/tree/main/bitnami/redis
redis:
  # When enabled this chart will also deploy a Redis
  enabled: true
  architecture: standalone
  service:
    ports:
      redis: 6379
  auth:
    enabled: true
    # You can use redis.auth.existingSecret for better secret management.
    # Plain text values here are part of bitnami/redis config and are allowed.
    password: "deckard"

service:
  enabled: true
  type: ClusterIP
  port: 8081
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # hosts:
    # - host: deckard.local
      # paths:
        # - path: /
          # pathType: ImplementationSpecific
  # tls: []
  #  - secretName: deckard-tls
  #    hosts:
  #      - deckard.local

resources: {}

#replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
# targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# To control deckard's housekeeer
housekeeper:
  # Defines if the housekeeper task will also run in the same pod as the deckard gRPC service
  # Useful for development purposes when you don't want a separate deployment for the housekeeper.
  # You must also set housekeeper.enabled to false if you want to change the default behavior
  # Deckard's DECKARD_HOUSEKEEPER_ENABLED environment variable
  self:
    enabled: false

  # If the housekeeper task will run in a separate deployment
  enabled: true

  image:
    repository: blipai/deckard
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  # The number of replicas for the housekeeper deployment
  # See https://github.com/takenet/deckard/issues/21
  replicaCount: 1

  labels: {}

  podAnnotations: {}

  podSecurityContext: {}

  securityContext: {}

  env: {}

  containerPorts: []

  resources: {}

  nodeSelector: {}

  tolerations: []

  affinity: {}

  service:
    enabled: true
    type: ClusterIP
    port: 8081
