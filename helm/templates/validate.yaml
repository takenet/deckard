{{- $usesMongo := eq .Values.storage.type "MONGODB" -}}
{{- $usesRedis := eq .Values.cache.type "REDIS" -}}
{{- $hasStorageSecret := ne .Values.connectionSecret.storage.existingSecret "" -}}
{{- $hasCacheSecret := ne .Values.connectionSecret.cache.existingSecret "" -}}

{{- if and $usesMongo (not .Values.mongodb.enabled) (not $hasStorageSecret) }}
{{- fail "connectionSecret.storage.existingSecret is required when storage.type=MONGODB and mongodb.enabled=false" }}
{{- end }}

{{- if and $usesRedis (not .Values.redis.enabled) (not $hasCacheSecret) }}
{{- fail "connectionSecret.cache.existingSecret is required when cache.type=REDIS and redis.enabled=false" }}
{{- end }}

{{- if and $usesMongo (or $hasStorageSecret .Values.mongodb.enabled) (eq .Values.connectionSecret.storage.key "") }}
{{- fail "connectionSecret.storage.key must be set when storage.type=MONGODB and a storage connection secret is used or generated" }}
{{- end }}

{{- if and $usesRedis (or $hasCacheSecret .Values.redis.enabled) (eq .Values.connectionSecret.cache.key "") }}
{{- fail "connectionSecret.cache.key must be set when cache.type=REDIS and a cache connection secret is used or generated" }}
{{- end }}