name: Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  GO_VERSION: 1.26.4

permissions:
  checks: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017

      redis:
        image: redis:8.2
        ports:
          - 6379:6379

    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/checkout@v7

      # Redis Cluster can't be modeled as a single GitHub Actions "services:" container: it needs
      # 6 nodes plus a one-shot init step to form the cluster, so it's started via docker compose
      # instead. Nodes run with network_mode: host and --cluster-announce-ip 127.0.0.1, so they're
      # reachable at localhost:7000-7005 from the go test process running directly on the runner.
      - name: Start Redis Cluster
        run: |
          docker compose -f docker/docker-compose.yml up -d \
            redis-cluster-node-0 redis-cluster-node-1 redis-cluster-node-2 \
            redis-cluster-node-3 redis-cluster-node-4 redis-cluster-node-5
          docker compose -f docker/docker-compose.yml run --rm redis-cluster-init

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-golang-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golang-

      - name: Install mockgen
        run: go install go.uber.org/mock/mockgen@latest

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Generate Mocks
        run: make gen-mocks

      - name: Generate TLS certificates
        run: make gen-cert

      - name: Go mod tidy
        run: go mod tidy

      - name: Make test
        run: make test

      - name: Stop Redis Cluster
        if: always()
        continue-on-error: true
        run: docker compose -f docker/docker-compose.yml down -v

      - name: Publish test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gotest.out
          path: gotest.out

      - name: Publish JUnit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: junit.xml
          path: junit.xml

      - name: JUnit report action
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: junit.xml
          job_name: test
          check_name: JUnit Test Report

      - name: Coverage Report
        uses: codecov/codecov-action@v7
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          files: coverage.out
          verbose: true
