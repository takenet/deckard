name: Release

on:
  release:
    types:
      - released

env:
  KO_DOCKER_REPO: index.docker.io/blipai
  GO_VERSION: 1.26.4
  DOTNET_VERSION: 6.0.x

jobs:
  release-deckard-executable:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-golang-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golang-

      - name: Build Linux AMD64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o exec/deckard-linux-amd64 internal/cmd/deckard/main.go

      - name: Build Windows AMD64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o exec/deckard-windows-amd64.exe internal/cmd/deckard/main.go

      - name: Install zip and tar
        run: |
          sudo apt-get install -y zip tar

      - name: Compress files
        run: |
          # Compress the Windows executable to zip
          zip -r -j deckard-windows-amd64.exe.zip exec/deckard-windows-amd64.exe

          # Compress the Linux executable to tar.gz
          tar -czvf deckard-linux-amd64.tar.gz -C exec deckard-linux-amd64

      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          files: |
            deckard-windows-amd64.exe.zip
            deckard-linux-amd64.tar.gz

  release-deckard-image:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/checkout@v7

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-golang-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-golang-

      - name: Setup Ko
        uses: ko-build/setup-ko@v0.10

      - name: Publish image
        env:
          auth_token: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          echo "${auth_token}" | ko login index.docker.io --username albertosilvablipai --password-stdin
          make build-image

  release-java-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - id: release_version
        name: Set release version
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Copy .proto
        run: mkdir -p java/src/main/proto && cp -r proto java/src/main/proto

      - id: gpg_key
        name: Install gpg secret key
        run: |
          cat <(echo -e "${{ secrets.JRELEASER_GPG_SECRET_KEY }}") | gpg --batch --import
          KEY_ID="$(gpg --list-secret-keys --keyid-format LONG --with-colons | awk -F: '/^sec:/ { print $5; exit }')"
          FINGERPRINT="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ { print $10; exit }')"
          if [[ -z "${KEY_ID}" || -z "${FINGERPRINT}" ]]; then
            echo "No GPG secret key found after import" >&2
            exit 1
          fi
          # Set ultimate trust using full fingerprint (import-ownertrust requires fingerprint, not key ID)
          echo "${FINGERPRINT}:6:" | gpg --batch --import-ownertrust
          gpg --list-secret-keys --keyid-format LONG
          echo "key_id=${KEY_ID}" >> "$GITHUB_OUTPUT"

      - name: Create maven settings.xml
        run: echo "${{secrets.MAVEN_CENTRAL_SETTINGS_XML}}" > ~/.m2/settings.xml

      - name: Set Java package version
        working-directory: java
        run: mvn --no-transfer-progress --batch-mode versions:set -DnewVersion=${{ steps.release_version.outputs.version }} -DgenerateBackupPoms=false

      - name: Publish package
        working-directory: java
        run: mvn --no-transfer-progress --batch-mode -Dgpg.keyname=${{ steps.gpg_key.outputs.key_id }} clean deploy -Ppublication
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-csharp-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - id: release_version
        name: Set release version
        run: |
          RELEASE_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET Core SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install dependencies
        working-directory: csharp
        run: dotnet restore

      - name: Copy .proto
        run: mkdir -p csharp/proto && cp -r proto csharp/

      - name: Build sources
        working-directory: csharp
        run: dotnet build --configuration Release

      - name: Pack NuGet package
        working-directory: csharp
        run: dotnet pack --no-build --configuration Release -p:PackageVersion=${{ steps.release_version.outputs.version }}

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish package
        working-directory: csharp
        run: find bin/Release/ -name '*.nupkg' | xargs -i dotnet nuget push {} --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
