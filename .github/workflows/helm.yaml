name: Deploy Deckard Helm chart to Github Pages

on:
  release:
    types:
      # 'published' covers both stable releases and pre-releases. Helm charts released with a
      # SemVer pre-release version (e.g. "1.0.0-rc1") are still safely published here, since Helm
      # ignores pre-release chart versions by default unless --devel is explicitly passed.
      # See: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#release
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag to (re)publish (e.g. v0.0.43). Leave empty to use the default branch. Use this to restore a previously published chart version that is missing from the live repo (e.g. https://takenet.github.io/deckard/).'
        required: false
        type: string

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Setup Helm
        uses: azure/setup-helm@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build chart dependencies
        working-directory: helm
        run: helm dependency update .
      - name: Lint chart
        working-directory: helm
        run: helm lint .
      - name: Package chart
        working-directory: helm
        run: helm package .
      - name: Prepare release directory
        run: |
          mkdir -p helm-release
          cp helm/deckard-*.tgz helm-release/

          # actions/deploy-pages replaces the ENTIRE site on every run (it's a one-shot artifact
          # upload, not an incremental commit to a gh-pages branch). If we only ever put the
          # chart version being released right now into helm-release/, every previously
          # published version disappears from https://takenet.github.io/deckard/ as soon as this
          # workflow runs again, breaking any consumer still pinned to an older chart version.
          #
          # To keep releases additive, fetch whatever is live today and carry every package we
          # don't already have forward into this deploy, then rebuild the index from the full
          # (old + new) set of packages actually present on disk.
          if curl -fsSL -o /tmp/live-index.yaml https://takenet.github.io/deckard/index.yaml; then
            for url in $(yq '.entries.deckard[].urls[]' /tmp/live-index.yaml); do
              filename="helm-release/$(basename "$url")"
              if [[ ! -f "$filename" ]]; then
                curl -fsSL -o "$filename" "$url"
              fi
            done
          else
            echo "::warning::Could not fetch the existing index.yaml from https://takenet.github.io/deckard/index.yaml; publishing only the chart version built in this run."
          fi

          helm repo index helm-release --url https://takenet.github.io/deckard/
          touch helm-release/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'helm-release/'
          # Namespace the artifact per run attempt so that re-running this
          # workflow (e.g. after a transient Pages/Actions API error) doesn't
          # collide with an artifact already uploaded by a previous attempt.
          # Without this, deploy-pages fails with:
          # "Multiple artifacts named github-pages were unexpectedly found for this workflow run."
          name: github-pages-${{ github.run_attempt }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}