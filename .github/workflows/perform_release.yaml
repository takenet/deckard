name: Perform Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, with or without a leading "v" (e.g. 1.0.0, v1.0.0-rc1, 0.4.2). Use the "-rcN" suffix for Release Candidates. Leave empty to release the version currently snapshotted in the sources (e.g. "1.0.0-SNAPSHOT" -> "1.0.0", "1.0.0-rc2-SNAPSHOT" -> "1.0.0-rc2").'
        required: false
        type: string

jobs:
  perform-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        # Full history and tags are needed to compute the previous release tag and to list
        # direct commits for the changelog below.
        fetch-depth: 0

    - name: Collect direct commits for changelog
      id: direct_commits
      run: |
        # Find the previous release tag, if any, to scope the commit range.
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
        RANGE="HEAD"
        if [[ -n "$PREVIOUS_TAG" ]]; then
          RANGE="$PREVIOUS_TAG..HEAD"
        fi

        # GitHub's auto-generated release notes only list merged pull requests. Squash-merged
        # PRs get a "(#123)" suffix appended to their commit message, so anything without that
        # suffix was pushed directly to the branch. Also skip this workflow's own version-bump
        # commits, since they aren't meaningful changes.
        DIRECT_COMMITS=$(git log "$RANGE" --no-merges --format='* %h %s' \
          | grep -vE '\(#[0-9]+\)$' \
          | grep -vE '^\* [0-9a-f]+ (build: .+ release|chore: .+-SNAPSHOT)$' \
          || true)

        ADDENDUM=""
        if [[ -n "$DIRECT_COMMITS" ]]; then
          ADDENDUM=$(printf '## Other commits\n\n%s\n' "$DIRECT_COMMITS")
        fi

        {
          echo 'addendum<<EOF'
          echo "$ADDENDUM"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Change versions
      id: change_versions
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        if [[ -n "$INPUT_VERSION" ]]; then
          # Strip a leading "v" if present (e.g. v1.0.0-rc1 -> 1.0.0-rc1)
          NEW_VERSION="${INPUT_VERSION#v}"
        else
          # No version given: release exactly what is currently snapshotted in the sources,
          # e.g. "1.0.0-SNAPSHOT" -> "1.0.0", or "1.0.0-rc2-SNAPSHOT" -> "1.0.0-rc2".
          CURRENT_VERSION=$(grep -oE 'const Version = "[^"]+"' internal/project/project.go | sed -E 's/const Version = "(.*)"/\1/')

          if [[ ! "$CURRENT_VERSION" =~ -SNAPSHOT$ ]]; then
            echo "::error::internal/project/project.go is not on a -SNAPSHOT version ('$CURRENT_VERSION'). Provide the 'version' input explicitly."
            exit 1
          fi

          NEW_VERSION="${CURRENT_VERSION%-SNAPSHOT}"
        fi

        # Validate and parse: X.Y.Z or X.Y.Z-rcN (no "v" prefix, no "-SNAPSHOT" suffix)
        if [[ ! "$NEW_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-rc([0-9]+))?$ ]]; then
          echo "::error::Invalid version '$NEW_VERSION'. Expected format: X.Y.Z or X.Y.Z-rcN (e.g. 1.0.0, 1.0.0-rc1, v0.4.2)."
          exit 1
        fi

        MAJOR="${BASH_REMATCH[1]}"
        MINOR="${BASH_REMATCH[2]}"
        PATCH="${BASH_REMATCH[3]}"
        RC="${BASH_REMATCH[5]}"

        if [[ -n "$RC" ]]; then
          IS_PRERELEASE=true
        else
          IS_PRERELEASE=false
        fi

        # Replace version in Golang project.go file
        sed -i -E "s/const Version = \"[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?-SNAPSHOT\"/const Version = \"$NEW_VERSION\"/" internal/project/project.go

        # Replace version in Java pom.xml file (matches only the top-level <version>, which is
        # uniquely identified by its 2-space indentation; dependency versions are indented deeper)
        sed -i -E "s/^  <version>[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?-SNAPSHOT<\/version>/  <version>$NEW_VERSION<\/version>/" java/pom.xml

        # Replace version in .NET Deckard.csproj file
        sed -i -E "s/    <PackageVersion>[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?-SNAPSHOT<\/PackageVersion>/    <PackageVersion>$NEW_VERSION<\/PackageVersion>/" csharp/Deckard.csproj

        # Replace app version in Helm Chart.yaml file
        sed -i -E "s/appVersion: \"[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?\"/appVersion: \"$NEW_VERSION\"/" helm/Chart.yaml

        # Replace chart version in Helm Chart.yaml file
        sed -i -E "s/^version: [0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?/version: $NEW_VERSION/" helm/Chart.yaml

        echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
        echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
        echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
        echo "patch=$PATCH" >> "$GITHUB_OUTPUT"
        echo "rc=$RC" >> "$GITHUB_OUTPUT"
        echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: 'build: ${{ steps.change_versions.outputs.new_version }} release'
        file_pattern: 'internal/project/project.go java/pom.xml csharp/Deckard.csproj helm/Chart.yaml'

    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ steps.change_versions.outputs.new_version }}
        prerelease: ${{ steps.change_versions.outputs.is_prerelease }}
        generate_release_notes: true
        token: ${{ secrets.RELEASE_PAT }}
      env:
        # https://github.com/orgs/community/discussions/25281
        # https://github.com/orgs/community/discussions/16244
        GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

    - name: Append direct commits to release notes
      if: steps.direct_commits.outputs.addendum != ''
      env:
        GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        TAG: v${{ steps.change_versions.outputs.new_version }}
        ADDENDUM: ${{ steps.direct_commits.outputs.addendum }}
      run: |
        CURRENT_BODY=$(gh release view "$TAG" --json body --jq .body)
        printf '%s\n\n%s\n' "$CURRENT_BODY" "$ADDENDUM" | gh release edit "$TAG" --notes-file -

    - name: Add -SNAPSHOT suffix
      id: add_snapshot_suffix
      run: |
        # Compute the next development version:
        # - After a Release Candidate (X.Y.Z-rcN), development continues towards the next RC,
        #   so only the "rc" number is bumped: X.Y.Z-rc(N+1)-SNAPSHOT.
        # - After a final release (X.Y.Z), development continues towards the next patch version:
        #   X.Y.(Z+1)-SNAPSHOT.
        if [[ -n "${{ steps.change_versions.outputs.rc }}" ]]; then
          NEXT_RC=$((${{ steps.change_versions.outputs.rc }} + 1))
          NEW_SNAPSHOT_VERSION="${{ steps.change_versions.outputs.major }}.${{ steps.change_versions.outputs.minor }}.${{ steps.change_versions.outputs.patch }}-rc$NEXT_RC-SNAPSHOT"
        else
          NEW_PATCH=$((${{ steps.change_versions.outputs.patch }} + 1))
          NEW_SNAPSHOT_VERSION="${{ steps.change_versions.outputs.major }}.${{ steps.change_versions.outputs.minor }}.$NEW_PATCH-SNAPSHOT"
        fi

        # Replace version in Golang project.go file
        sed -i -E "s/const Version = \"[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?\"/const Version = \"$NEW_SNAPSHOT_VERSION\"/" internal/project/project.go

        # Replace version in Java pom.xml file (matches only the top-level <version>, which is
        # uniquely identified by its 2-space indentation; dependency versions are indented deeper)
        sed -i -E "s/^  <version>[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?<\/version>/  <version>$NEW_SNAPSHOT_VERSION<\/version>/" java/pom.xml

        # Replace version in .NET Deckard.csproj file
        sed -i -E "s/    <PackageVersion>[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?<\/PackageVersion>/    <PackageVersion>$NEW_SNAPSHOT_VERSION<\/PackageVersion>/" csharp/Deckard.csproj

        echo "new_snapshot_version=$NEW_SNAPSHOT_VERSION" >> "$GITHUB_OUTPUT"

    - name: Commit changes
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: 'chore: ${{ steps.add_snapshot_suffix.outputs.new_snapshot_version }}'
        file_pattern: 'internal/project/project.go java/pom.xml csharp/Deckard.csproj'
